  <!-- Red band -->
  <line x1="16" y1="14" x2="32" y2="7" stroke="#E63946" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Amber band -->
  <line x1="16" y1="14" x2="32" y2="14" stroke="#F4A261" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Green band -->
  <line x1="16" y1="14" x2="32" y2="21" stroke="#2D9E5F" stroke-width="1.8" stroke-linecap="round"/>
