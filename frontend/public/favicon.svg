  <!-- Bottom depth face -->
  <polygon points="28,26 30,29 6,29 4,26" fill="rgba(26,26,26,0.12)" stroke="#1A1A1A" stroke-width="1.2" stroke-linejoin="round"/>
  <!-- Right depth face -->
